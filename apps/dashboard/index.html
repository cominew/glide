// apps/dashboard/index.html

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Glide OS</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { background: transparent; overflow: hidden; width: 100vw; height: 100vh; }
      #ritual-layer {
        position: absolute; inset: 0;
        background: #000;
        z-index: 10;
      }
      #ritual-video {
        width: 100%; height: 100%;
        object-fit: cover;
      }
      #field-layer {
        position: absolute; inset: 0;
        opacity: 0;
        transition: opacity 1.2s ease;
        pointer-events: none;
        z-index: 5;
      }
      #field-layer.manifest {
        opacity: 1;
        pointer-events: auto;
      }
    </style>
  </head>
  <body>
    <div id="ritual-layer">
      <video id="ritual-video" autoplay muted playsinline></video>
    </div>
    <div id="field-layer">
      <div id="root"></div>
    </div>
    <script type="module" src="/ritual.ts"></script>
  </body>
</html>
